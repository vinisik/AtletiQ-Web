{% extends "predictions/base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] px-4 animate-fadeIn">
    <div class="bg-[#1E1E1E] w-full max-w-md p-8 rounded-2xl border border-[#333] shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#00E676] to-transparent opacity-70"></div>

        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-white uppercase tracking-tighter">Entrar no <span class="text-[#00E676]">AtletiQ</span></h2>
            <p class="text-xs text-gray-500 mt-2 font-mono uppercase tracking-widest">Acesse suas previsões</p>
        </div>

        <form method="POST" class="flex flex-col gap-5">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="bg-red-500/10 border border-red-500/50 text-red-500 p-3 rounded-lg text-xs font-bold text-center">
                    Usuário ou senha incorretos. Tente novamente.
                </div>
            {% endif %}

            <div class="flex flex-col gap-1">
                <label for="id_username" class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Usuário</label>
                <input type="text" name="username" id="id_username" required class="bg-[#121212] border border-[#333] text-white p-3 rounded-xl focus:border-[#00E676] focus:ring-1 focus:ring-[#00E676] outline-none transition-all w-full">
            </div>

            <div class="flex flex-col gap-1">
                <label for="id_password" class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Senha</label>
                <input type="password" name="password" id="id_password" required class="bg-[#121212] border border-[#333] text-white p-3 rounded-xl focus:border-[#00E676] focus:ring-1 focus:ring-[#00E676] outline-none transition-all w-full">
            </div>

            <button type="submit" class="mt-4 w-full bg-[#00E676] text-black font-black uppercase tracking-widest py-4 rounded-xl hover:bg-[#00c865] transition-transform">
                Fazer Login
            </button>
        </form>

        <p class="text-center text-gray-400 text-xs mt-8">
            Ainda não tem conta? 
            <a href="{% url 'cadastro' %}" class="text-[#00E676] font-bold hover:underline transition-colors">Crie uma agora</a>
        </p>
    </div>
</div>
{% endblock %}
