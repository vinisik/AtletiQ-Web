{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtletiQ Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #E0E0E0; font-family: 'Inter', sans-serif; font-size: 1rem; }
        
        .tab-active { 
            color: #00E676; 
            border-bottom: 3px solid #00E676; 
        }
        
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Ocultar barra de rolagem na navegação mobile */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#121212] min-h-screen flex flex-col">
    
    <header class="bg-black border-b border-[#222] sticky top-0 z-50 shadow-lg">
    
        <div class="max-w-7xl mx-auto px-4 py-3 md:py-0 flex justify-between items-center h-[60px] md:h-[72px]">
            
            <div class="flex items-center gap-2 md:gap-3 shrink-0">
                {% load static %}
                <img src="{% static 'img/logo.png' %}" alt="Logo" class="w-8 h-8 md:w-10 md:h-10 object-contain">
                
                <a href="{% url 'calendario' %}">
                    <h1 class="text-white text-xl md:text-3xl font-black tracking-tighter uppercase italic">
                        AtletiQ <span class="text-[#00E676]">Web</span>
                    </h1>
                </a>
            </div>

            <nav class="hidden md:flex h-full items-center gap-8">
                <a href="{% url 'calendario' %}" 
                class="h-full flex items-center px-2 text-sm font-bold uppercase tracking-[0.15em] border-b-[3px] transition-all {% if request.resolver_match.url_name == 'calendario' %}text-white border-[#00E676] opacity-100{% else %}text-gray-400 border-transparent opacity-60 hover:opacity-100 hover:text-white hover:border-gray-700{% endif %}">
                    Jogos
                </a>
                <a href="{% url 'classificacao' %}" 
                class="h-full flex items-center px-2 text-sm font-bold uppercase tracking-[0.15em] border-b-[3px] transition-all {% if request.resolver_match.url_name == 'classificacao' %}text-white border-[#00E676] opacity-100{% else %}text-gray-400 border-transparent opacity-60 hover:opacity-100 hover:text-white hover:border-gray-700{% endif %}">
                    Tabela
                </a>
                <a href="{% url 'simulacao' %}" 
                class="h-full flex items-center px-2 text-sm font-bold uppercase tracking-[0.15em] border-b-[3px] transition-all {% if request.resolver_match.url_name == 'simulacao' %}text-white border-[#00E676] opacity-100{% else %}text-gray-400 border-transparent opacity-60 hover:opacity-100 hover:text-white hover:border-gray-700{% endif %}">
                    Simulação
                </a>
            </nav>

            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                    <span class="text-white text-sm font-bold">Olá, <span class="text-[#00E676]">{{ user.username }}</span></span>
                    
                    <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="text-gray-400 hover:text-red-500 font-bold text-sm transition-colors">
                            Sair
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-white hover:text-[#00E676] font-bold text-sm transition-colors">
                        Entrar
                    </a>
                    <a href="{% url 'cadastro' %}" class="bg-[#00E676] text-black px-4 py-2 rounded-full font-black text-sm hover:bg-[#00c865] transition-colors shadow-lg">
                        Criar Conta
                    </a>
                {% endif %}
            </div>
            
        </div>

        <div class="w-full overflow-x-auto no-scrollbar md:hidden border-t border-[#222]">
            <nav class="flex justify-center gap-5 min-w-max px-4">
                <a href="{% url 'calendario' %}" 
                class="pb-3 pt-3 text-[11px] font-bold uppercase tracking-[0.15em] border-b-[3px] transition-all {% if request.resolver_match.url_name == 'calendario' %}text-white border-[#00E676] opacity-100{% else %}text-gray-400 border-transparent opacity-60 hover:opacity-100 hover:text-white{% endif %}">
                    Jogos
                </a>
                <a href="{% url 'classificacao' %}" 
                class="pb-3 pt-3 text-[11px] font-bold uppercase tracking-[0.15em] border-b-[3px] transition-all {% if request.resolver_match.url_name == 'classificacao' %}text-white border-[#00E676] opacity-100{% else %}text-gray-400 border-transparent opacity-60 hover:opacity-100 hover:text-white{% endif %}">
                    Tabela
                </a>
                <a href="{% url 'simulacao' %}" 
                class="pb-3 pt-3 text-[11px] font-bold uppercase tracking-[0.15em] border-b-[3px] transition-all {% if request.resolver_match.url_name == 'simulacao' %}text-white border-[#00E676] opacity-100{% else %}text-gray-400 border-transparent opacity-60 hover:opacity-100 hover:text-white{% endif %}">
                    Simulação
                </a>
            </nav>
        </div>
    </header>

    <main class="flex-1 w-full max-w-7xl mx-auto p-4 md:p-6 pb-20">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
