<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtletiQ Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tipografia base reduzida de 1.1rem para 1rem para melhor leitura em mobile */
        body { background-color: #121212; color: #E0E0E0; font-family: 'Inter', sans-serif; font-size: 1rem; }
        .tab-active { color: #00E676; border-bottom: 3px solid #00E676; }
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-6xl mx-auto bg-[#121212]">
    <header class="p-6 md:p-8 mb-4">
        <h1 class="text-[#00E676] text-3xl md:text-4xl font-black tracking-tighter mb-6">AtletiQ Web</h1>
        
        <nav class="flex justify-around md:justify-start md:gap-10 border-b border-[#333333]">
            <a href="{% url 'calendario' %}" 
               class="pb-3 px-3 text-base font-bold transition-all {% if request.resolver_match.url_name == 'calendario' %}tab-active{% else %}text-gray-500 hover:text-white{% endif %}">
                Jogos
            </a>
            <a href="{% url 'classificacao' %}" 
               class="pb-3 px-3 text-base font-bold transition-all {% if request.resolver_match.url_name == 'classificacao' %}tab-active{% else %}text-gray-500 hover:text-white{% endif %}">
                Tabela
            </a>
            <a href="{% url 'simulacao' %}" 
               class="pb-3 px-3 text-base font-bold transition-all {% if request.resolver_match.url_name == 'simulacao' %}tab-active{% else %}text-gray-500 hover:text-white{% endif %}">
                Simulação
            </a>
        </nav>
    </header>

    <main class="pb-20 p-4 md:p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
