<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtletiQ Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #E0E0E0; font-family: 'Inter', sans-serif; font-size: 1rem; }
        
        /* Estilo OneFootball para abas ativas */
        .tab-active { 
            color: #FFFFFF; 
            border-bottom-color: #00E676; 
            opacity: 1;
        }
        
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Ocultar barra de rolagem na navegação mobile */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#121212] min-h-screen flex flex-col">
    
    <header class="bg-black border-b border-[#222] sticky top-0 z-50 shadow-lg">
        
        <div class="max-w-7xl mx-auto px-4 py-3 md:py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <h1 class="text-white text-xl md:text-3xl font-black tracking-tighter uppercase italic">
                    AtletiQ <span class="text-[#00E676]">Web</span>
                </h1>
            </div>
            <a href="{% url 'atualizar_sistema' %}" class="text-xs font-bold text-gray-500 hover:text-[#00E676] uppercase tracking-widest border border-gray-700 px-3 py-1 rounded hover:border-[#00E676] transition-colors">
                Atualizar Dados
            </a>
            
        </div>

        <div class="w-full overflow-x-auto no-scrollbar">
            <nav class="max-w-7xl mx-auto px-4 flex gap-6 md:gap-8 min-w-max">
                <a href="{% url 'calendario' %}" 
                   class="pb-3 pt-1 text-[11px] md:text-base font-bold uppercase tracking-[0.15em] border-b-[3px] transition-all border-transparent opacity-60 hover:opacity-100 hover:text-white {% if request.resolver_match.url_name == 'calendario' %}tab-active{% else %}text-gray-400{% endif %}">
                    Jogos
                </a>
                <a href="{% url 'classificacao' %}" 
                   class="pb-3 pt-1 text-[11px] md:text-base font-bold uppercase tracking-[0.15em] border-b-[3px] transition-all border-transparent opacity-60 hover:opacity-100 hover:text-white {% if request.resolver_match.url_name == 'classificacao' %}tab-active{% else %}text-gray-400{% endif %}">
                    Tabela
                </a>
                <a href="{% url 'simulacao' %}" 
                   class="pb-3 pt-1 text-[11px] md:text-base font-bold uppercase tracking-[0.15em] border-b-[3px] transition-all border-transparent opacity-60 hover:opacity-100 hover:text-white {% if request.resolver_match.url_name == 'simulacao' %}tab-active{% else %}text-gray-400{% endif %}">
                    Simulação
                </a>
            </nav>
        </div>
    </header>

    <main class="flex-1 w-full max-w-7xl mx-auto p-4 md:p-6 pb-20">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
